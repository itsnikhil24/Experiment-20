name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt


    - name: Run Tests
      run: pytest test_app.py


    - name: Build Docker Image
      run: docker build -t flask-backend .


    - name: Run Container
      run: |
        docker run -d -p 5001:5000 --name test-container flask-backend
        sleep 5


    - name: Test Container
      run: curl http://localhost:5001/health


    - name: Stop Container
      run: docker stop test-container